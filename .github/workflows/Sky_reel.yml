name: Sky Travel Reel
on:
  workflow_dispatch:
    inputs:
      destination:
        description: 'Destination name (e.g., "Bhutan", "Jaipur")'
        required: true
        type: string
        default: 'Bhutan'
      audience_type:
        description: 'Target audience (couples, friends, luxury travelers, general travelers)'
        required: false
        default: 'general travelers'

permissions:
  contents: write

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate travel reel and send to Telegram
        # FIX: Pass destination via env var to avoid shell injection
        # FIX: OPENAI_API_KEY added so ChatGPT fallback actually works
        env:
          DESTINATION: ${{ github.event.inputs.destination }}
          AUDIENCE_TYPE: ${{ github.event.inputs.audience_type }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_travel_reel.py

      # FIX: Upload reel as artifact so it's recoverable if Telegram send fails
      - name: Upload reel as artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: travel-reel-${{ github.event.inputs.destination }}
          path: reel.mp4
          retention-days: 3
